services:
  postgres:
    image: postgres:16
    container_name: optisched-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - optisched_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - optisched-network

  optimizer:
    build:
      context: ./OptiSched-Optimizer
    container_name: optisched-optimizer
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
        - optisched-network

  api:
    build:
      context: ./OptiSched-API
    container_name: optisched-api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OPTIMIZER_URL: http://optimizer:8000
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_PRIVATE_KEY: file:/app.key
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_PUBLIC_KEY: file:/app.pub
      SPRING_FLYWAY_PLACEHOLDERS_SUPERADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SPRING_FLYWAY_PLACEHOLDERS_SUPERADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD_HASH}
    ports:
      - "8080:8080"
    volumes:
      - ./app.key:/app.key
      - ./app.pub:/app.pub
    depends_on:
      postgres:
        condition: service_healthy
      optimizer:
        condition: service_healthy
    networks:
      - optisched-network

volumes:
  optisched_pgdata:

networks:
  optisched-network:
    driver: bridge